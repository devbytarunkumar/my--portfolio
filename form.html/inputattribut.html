<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    DATE <input TYPE="DATE"  placeholder="DATE"><BR>
    FILE <INPUT TYPE="file"><br>
    color <input type="color"><br>
    range <input type="range"><br>
    click here <input type="button" value="click"><br>
    data submit <input type="button"  value ="submit" ><br>


    <label for="male">male:</label>
    <input type="radio" id="male" name="gender"  value="male"><br>
    <label for="female">female:</label>
    <input type="radio" id="female" name="gender"  value="female"><br>
    <label for="other">other:</label>
    <input type="radio" id="other" name="gender"  value="other"><br>

    <label for="apple">Apple:</label>
    <input type="checkbox" id="apple" name="fruit" value="apple"><br>
    <label for="mango">Mango:</label>
    <input type="checkbox" id="mango" name="fruit" value="mango"><br>
    <label for="banana">Banana:</label>
    <input type="checkbox" id="banana" name="fruit" value="banana"><br>

    <label for="country">choose a country</label>
    <select id="country" name="country">
        <option value="india">india</option>
        <option value="pakistan">pakistan</option>
        <option value="uk">uk</option>
        <option value="america">america</option>
        <option value="srilanka">srilanka</option>
        <option value="canada">canada</option>




    </select>
    <form>
        <textarea name="story" id="story" cols="5" rows="4"></textarea>
    </form>
    
</body>
</html>
